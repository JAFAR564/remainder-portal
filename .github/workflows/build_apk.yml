name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Enables manual trigger from the GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Configure Flutter for Android
        run: |
          flutter config --enable-android
          if [ -d "android" ]; then
            cd android
            # Restore gradlew wrapper if missing
            if [ ! -f "gradlew" ]; then
              flutter create --platforms=android ..
            fi
            chmod +x gradlew
            cd ..
          fi

      - name: Set up Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: Build Shorebird Release APK
        run: |
          shorebird release android --force
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: remainder-portal-apk
          path: build/app/outputs/flutter-apk/app-release.apk
