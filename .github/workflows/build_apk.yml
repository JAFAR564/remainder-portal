name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Enables manual trigger from the GitHub Actions UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Flutter Analyze
        run: flutter analyze
        continue-on-error: true

      - name: Configure Flutter for Android
        run: |
          flutter config --enable-android
          if [ -d "android" ]; then
            cd android
            # Restore gradlew wrapper if missing
            if [ ! -f "gradlew" ]; then
              flutter create --platforms=android ..
            fi
            chmod +x gradlew
            cd ..
          fi

      - name: Set up Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: Build Android APK
        run: |
          if [ -n "${{ secrets.SHOREBIRD_TOKEN }}" ]; then
            echo "Shorebird token detected. Attempting to push Shorebird patch..."
            shorebird patch android --allow-asset-diffs -- --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} --dart-define=DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }} || {
              echo "Shorebird patch failed. Compiling a new base Shorebird release..."
              shorebird release android --artifact apk -- --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} --dart-define=DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            }
            # Always ensure a downloadable APK is produced for fresh installs
            if [ ! -f "build/app/outputs/flutter-apk/app-release.apk" ] && [ ! -f "build/app/outputs/apk/release/app-release.apk" ]; then
              echo "Compiling fallback release APK for downloadable artifacts..."
              flutter build apk --release --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} --dart-define=DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
            fi
          else
            echo "No Shorebird token detected. Falling back to standard Flutter build..."
            flutter build apk --release --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} --dart-define=DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}
          fi
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: remainder-portal-apk
          path: build/app/outputs/**/*.apk
