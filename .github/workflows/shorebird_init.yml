name: Shorebird Cloud Init

on:
  workflow_dispatch:

jobs:
  init:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Configure Flutter for Android
        run: |
          flutter config --enable-android
          if [ -d "android" ]; then
            cd android
            # Ensure gradlew file is present (if gitignored, create it)
            if [ ! -f "gradlew" ]; then
              flutter create --platforms=android ..
            fi
            chmod +x gradlew
            ./gradlew --version
            cd ..
          fi

      - name: Set up Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: Run Shorebird Init
        run: |
          shorebird init --verbose --force --display-name "Remainder Portal"
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        
      - name: Commit and Push Configuration
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shorebird.yaml
          git commit -m "chore: add shorebird configuration [skip ci]" || echo "No changes to commit"
          git push origin main
