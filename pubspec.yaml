name: remainder_portal
description: "A bespoke, light ethereal platform for The Remainder Portal community."
version: 1.0.0+3

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  supabase_flutter: ^2.6.0
  go_router: ^14.0.0
  google_fonts: ^8.1.0
  flutter_riverpod: ^3.3.2
  shared_preferences: ^2.5.5
  freezed_annotation: ^3.1.0
  dio: ^5.10.0
  json_annotation: ^4.12.0
  url_launcher: ^6.3.2
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml
  shaders:
    - shaders/iridescent_overlay.frag
